name: Bug report
description: Something didn't work as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Ran `groundtruth verify ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: groundtruth version
      placeholder: "output of `groundtruth version`"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "output of `node --version`"
    validations:
      required: true
