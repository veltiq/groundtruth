<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Demo: groundtruth verify flags a claim the diff doesn't support">
  <style>
    /* Reveals in sequence where animations are supported; degrades to a full
       static frame everywhere else (base opacity is 1). */
    .r { opacity: 1; animation: gt-reveal 0.45s ease both; }
    @keyframes gt-reveal { from { opacity: 0; } to { opacity: 1; } }
  </style>

  <rect width="900" height="430" rx="14" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="899" height="429" rx="14" fill="none" stroke="#30363d"/>

  <circle cx="28" cy="28" r="6" fill="#ff5f56"/>
  <circle cx="48" cy="28" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="28" r="6" fill="#27c93f"/>
  <text x="450" y="32" font-size="12" fill="#6e7681" text-anchor="middle">claude code — your project</text>

  <g font-size="16">
    <text class="r" style="animation-delay:.2s" x="32" y="82" fill="#6e7681">$ <tspan fill="#e6edf3">npx @twarc_net/groundtruth verify</tspan></text>

    <text class="r" style="animation-delay:.9s" x="32" y="120" font-size="14" fill="#8b949e">Claude said: “Added a <tspan fill="#c9d1d9">`rateLimiter`</tspan> to <tspan fill="#c9d1d9">`src/server.ts`</tspan>, fixed the bug, added tests.”</text>

    <g class="r" style="animation-delay:1.5s">
      <rect x="32" y="140" width="836" height="246" rx="10" fill="#010409" stroke="#30363d"/>
      <text x="56" y="176" font-size="16" fill="#e6edf3" font-weight="700">groundtruth<tspan fill="#6e7681" font-weight="400"> — claim check</tspan></text>
    </g>

    <text class="r" style="animation-delay:2.0s" x="56" y="216"><tspan fill="#3fb950">✓ verified</tspan><tspan fill="#6e7681">     file </tspan><tspan fill="#58a6ff">src/auth.ts</tspan></text>
    <text class="r" style="animation-delay:2.5s" x="56" y="252"><tspan fill="#f85149">✕ unsupported</tspan><tspan fill="#6e7681">  symbol </tspan><tspan fill="#58a6ff">`rateLimiter`</tspan></text>
    <text class="r" style="animation-delay:2.8s" x="56" y="278" font-size="13" fill="#6e7681">   never appears in this turn's changes</text>
    <text class="r" style="animation-delay:3.2s" x="56" y="316"><tspan fill="#d29922">! review</tspan><tspan fill="#6e7681">       action </tspan><tspan fill="#8b949e">“fixed the bug”</tspan></text>

    <text class="r" style="animation-delay:3.7s" x="56" y="360" fill="#6e7681">3 claims · <tspan fill="#3fb950">1 verified</tspan> · <tspan fill="#f85149">1 unsupported</tspan> · <tspan fill="#d29922">1 to review</tspan></text>
  </g>
</svg>
